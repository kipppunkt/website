<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
  <defs>
    <filter id="outer-black-glow"
            x="-80%" y="-80%" width="260%" height="260%"
            color-interpolation-filters="sRGB">
      <feMorphology in="SourceAlpha" operator="dilate" radius="2" result="spread"/>
      <feGaussianBlur in="spread" stdDeviation="25" result="blur"/>
      <feComposite in="blur" in2="SourceAlpha" operator="out" result="outer"/>
      <feFlood flood-color="black" flood-opacity="0.55" result="black"/>
      <feComposite in="black" in2="outer" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="500" cy="500" r="400" fill="white" filter="url(#outer-black-glow)"/>
</svg>
